<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact - Eugene Evgen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  
  <link rel="icon" href="/images/favicon.ico" sizes="any">
  <link rel="icon" href="/images/icon-192.png" type="image/png">
  
  <style>
    :root {
      --bg-color: #F6F6F6; 
      --text-color: #111; 
      --secondary-text: #666; 
      --link-color: #111; 
      --divider-color: #e5e5e5;
      --header-bg: rgba(255, 255, 255, 0.6); 
      --header-border: rgba(0, 0, 0, 0.05);
      --btn-bg: #111; 
      --btn-text: #fff;
      --input-bg: #ffffff;
      --input-border: #e5e5e5;
      --input-placeholder: #999;
      --input-focus: #111;
      --submit-btn-bg: #222;
      --submit-btn-text: #fff;
      --font-heading: 'Bricolage Grotesque', sans-serif;
      --font-body: 'Instrument Sans', sans-serif;
      --container-width: 1040px; 
      --spacing-main: 24px; 
    }
    body.night {
      --bg-color: #121212; 
      --text-color: #f0f0f0; 
      --secondary-text: #999; 
      --link-color: #fff; 
      --divider-color: #333;
      --header-bg: rgba(30, 30, 30, 0.6); 
      --header-border: rgba(255, 255, 255, 0.1); 
      --btn-bg: #fff; 
      --btn-text: #000;
      --input-bg: #262626;
      --input-border: #333333;
      --input-placeholder: #666;
      --input-focus: #fff;
      --submit-btn-bg: #f0f0f0;
      --submit-btn-text: #111;
    }
    * { box-sizing: border-box; }
    body { 
        margin: 0; padding: 0; 
        background-color: var(--bg-color); 
        color: var(--text-color); 
        font-family: var(--font-body); 
        font-size: 16px; line-height: 1.6; 
        transition: background-color 0.3s ease, color 0.3s ease; 
    }
    h1, h2, h3 { font-family: var(--font-heading); font-weight: 600; margin: 0; }
    p { margin-top: 0; margin-bottom: 16px; }
    a { color: var(--link-color); text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.7; }

    .container { 
        max-width: var(--container-width); width: 100%; margin: 0 auto; 
        padding: var(--spacing-main) 20px;
        display: flex; flex-direction: column; 
    }
    .content-grid { width: 100%; display: flex; flex-direction: column; align-items: center; }
    .content-col { width: 100%; max-width: 640px; }

    /* HEADER WRAPPER */
    .header-wrapper {
        position: sticky;
        top: 0;
        z-index: 1001;
        width: 100%;
    }
    .header-container {
        max-width: var(--container-width);
        width: 100%;
        margin: 0 auto;
        padding: var(--spacing-main) 20px 0 20px;
        transition: padding 0.3s ease;
    }
    .header-wrapper.scrolled .header-container {
        padding-top: 12px;
        padding-bottom: 12px;
    }

    /* HEADER */
    .main-header { 
        display: flex; justify-content: space-between; align-items: center; 
        padding: 10px 12px 10px 32px; 
        background-color: var(--header-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
        border-radius: 100px; border: 1px solid var(--header-border); 
        width: 100%;
        transition: background-color 0.3s ease, border-color 0.3s ease, width 0.3s ease, padding 0.3s ease, box-shadow 0.3s ease;
    }
    .header-wrapper.scrolled .main-header {
        background-color: transparent;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        border-color: transparent;
        padding: 0;
        width: auto;
        box-shadow: none;
        justify-content: flex-start;
    }
    .header-wrapper.scrolled .header-right {
        display: none;
    }

    .nav-links { 
        display: flex; align-items: center; gap: 24px;
        transition: background-color 0.3s ease, border 0.3s ease, padding 0.3s ease, box-shadow 0.3s ease;
    }
    .header-wrapper.scrolled .nav-links {
        background-color: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--header-border);
        border-radius: 100px;
        padding: 8px 20px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        gap: 20px;
    }
    body.night .header-wrapper.scrolled .nav-links {
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .nav-links a.text-link {
        font-family: var(--font-body);
        font-weight: 500;
        font-size: 15px;
        opacity: 0.6;
        transition: opacity 0.2s;
    }
    .nav-links a.text-link.nav-active {
        opacity: 1;
        font-weight: 600;
        cursor: default;
    }
    .nav-links a.text-link:not(.nav-active):hover { opacity: 1; }
    
    .header-left, .header-right { display: flex; align-items: center; gap: 24px; }
    
    .theme-toggle { width: 20px; height: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.7; transition: opacity 0.2s; }
    .theme-toggle:hover { opacity: 1; }
    .theme-toggle svg { width: 20px; height: 20px; display: block; }
    body.day .icon-moon { display: block !important; fill: #333; }
    body.day .icon-sun { display: none !important; }
    body.night .icon-moon { display: none !important; }
    body.night .icon-sun { display: block !important; fill: #fff; stroke: #fff; }

    .btn-cv { 
        background-color: var(--btn-bg); color: var(--btn-text) !important; 
        padding: 10px 20px; border-radius: 100px; 
        font-family: var(--font-body); font-weight: 600; 
        font-size: 14px; text-decoration: none; border: none; 
    }

    /* MOBILE MENU */
    .mobile-menu-btn { display: none; cursor: pointer; font-weight: 600; font-size: 15px; margin-left: 8px; }
    .mobile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: var(--bg-color); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 32px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 20px; }
    .mobile-overlay.active { opacity: 1; pointer-events: all; }
    .mobile-link { font-size: 24px; font-weight: 600; text-decoration: none; color: var(--text-color); opacity: 0.6; transition: opacity 0.2s; }
    .mobile-link.nav-active { opacity: 1; pointer-events: none; }
    .mobile-btn-cv { font-size: 18px; padding: 14px 28px; }

    /* CONTACT FORM */
    h1 {
        font-family: var(--font-body);
        font-size: 24px;
        font-weight: 500;
        line-height: 1.3;
        margin-bottom: 32px;
        margin-top: 0;
        text-align: center;
    }
    form { display: flex; flex-direction: column; gap: 16px; max-width: 100%; }
    input, select, textarea { width: 100%; background-color: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-color); padding: 12px 14px; border-radius: 10px; font-family: var(--font-body); font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none; }
    input::placeholder, textarea::placeholder { color: var(--input-placeholder); }
    input:focus, select:focus, textarea:focus { border-color: var(--input-focus); box-shadow: 0 0 0 1px var(--input-focus); }
    textarea { min-height: 120px; resize: vertical; }
    .select-wrapper { position: relative; }
    .select-wrapper::after { content: ''; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 10px; height: 6px; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23999999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-size: contain; pointer-events: none; }
    select { cursor: pointer; color: var(--text-color); }
    select:invalid { color: var(--input-placeholder); }
    option { color: #111; }
    button[type="submit"] { background-color: var(--submit-btn-bg); color: var(--submit-btn-text); font-weight: 600; font-size: 15px; padding: 12px; border-radius: 100px; border: 1px solid transparent; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.1s; }
    button[type="submit"]:hover { opacity: 0.9; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }
    .form-note { font-size: 14px; color: var(--secondary-text); text-align: center; margin: 0; margin-top: 4px; }

    /* FAB */
    .fab-up { position: fixed; bottom: 32px; right: 32px; width: 48px; height: 48px; border-radius: 50%; background-color: var(--btn-bg); color: var(--btn-text); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 999; opacity: 0; pointer-events: none; transform: translateY(20px); transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .fab-up.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .fab-up:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.15); }
    .fab-up svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    body.night .fab-up { box-shadow: 0 8px 24px rgba(255,255,255,0.05); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .mobile-menu-btn { display: block; }
      .btn-cv { display: none; }
      .header-container { padding-top: 16px; }
      .header-wrapper.scrolled .header-container { padding-top: 8px; padding-bottom: 8px; }
      .main-header,
      .header-wrapper.scrolled .main-header {
        height: 60px;
        min-height: 60px;
        padding: 0 24px;
        align-items: center;
        width: 100%;
        background-color: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-color: var(--header-border);
        justify-content: space-between;
      }
      .header-wrapper.scrolled .header-right { display: flex; }
      .header-left, .header-right { height: 100%; display: flex; align-items: center; }
      .fab-up { bottom: 24px; right: 24px; width: 40px; height: 40px; }
      .fab-up svg { width: 20px; height: 20px; }
    }
  </style>
</head>
<body class="day">

<div class="mobile-overlay">
    <a href="/" class="mobile-link">Experience</a>
    <a href="/projects/" class="mobile-link">Projects</a>
    <a href="/contact/" class="mobile-link nav-active">Contact</a>
    <a href="/Eugene Evgen CV - Lead Product Designer.pdf" class="btn-cv mobile-btn-cv" target="_blank" style="display:block; margin-top:16px;">Download CV</a>
</div>

<div class="header-wrapper" id="header-wrapper">
    <div class="header-container">
        <header class="main-header">
            <div class="header-left">
                <nav class="nav-links">
                    <a href="/" class="text-link">Experience</a>
                    <a href="/projects/" class="text-link">Projects</a>
                    <a href="/contact/" class="text-link nav-active">Contact</a>
                </nav>
                <div class="mobile-menu-btn">Menu</div>
            </div>
            <div class="header-right">
                <div id="theme-btn" class="theme-toggle">
                    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </div>
                <a href="/Eugene Evgen CV - Lead Product Designer.pdf" class="btn-cv" target="_blank">Download CV</a>
            </div>
        </header>
    </div>
</div>

<div class="container">
  <div class="content-grid">
    <div class="content-col">
       
       <h1>Ready to level up your product UX?</h1>
       
       <form action="https://formspree.io/f/xvzpopyl" method="POST">
           <input type="text" name="name" placeholder="Your name*" required>
           <input type="email" name="email" placeholder="your@email.com*" required>
           
           <div class="select-wrapper">
               <select name="subject" required>
                   <option value="" disabled selected>What's your current focus?</option>
                   <option value="Audit">UX audit & conversion optimization</option>
                   <option value="AI">Integrating AI into a product or workflow</option>
                   <option value="Redesign">Redesigning a complex/legacy SaaS</option>
                   <option value="Scale">Scaling an existing SaaS</option>
                   <option value="MVP">Building a new product / MVP</option>
                   <option value="Research">UX research & user testing</option>
                   <option value="Other">Other / not sure yet</option>
               </select>
           </div>
           
           <textarea name="message" placeholder="Tell me a bit about your platform. What are your main goals, or what specific bottlenecks are you trying to fix right now?" required></textarea>
           
           <button type="submit">Discuss your project</button>
           
           <p class="form-note">No pressure — just a quick chat to see if my UX approach is a good fit for your business goals.</p>
       </form>

    </div>
  </div>
</div>

<div id="fab-up" class="fab-up">
    <svg viewBox="0 0 24 24">
        <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
</div>

<script>
  // Theme
  const themeBtn = document.getElementById('theme-btn');
  const body = document.body;
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'night') { body.classList.remove('day'); body.classList.add('night'); } 
  else { body.classList.add('day'); }
  themeBtn.addEventListener('click', function() {
      if (body.classList.contains('day')) {
          body.classList.remove('day'); body.classList.add('night'); localStorage.setItem('theme', 'night');
      } else {
          body.classList.remove('night'); body.classList.add('day'); localStorage.setItem('theme', 'day');
      }
  });

  // Mobile Menu
  const menuBtn = document.querySelector('.mobile-menu-btn');
  const overlay = document.querySelector('.mobile-overlay');
  let isMenuOpen = false;
  menuBtn.addEventListener('click', () => {
      isMenuOpen = !isMenuOpen;
      if (isMenuOpen) {
          overlay.classList.add('active');
          menuBtn.innerText = "Close";
          document.body.style.overflow = 'hidden';
      } else {
          overlay.classList.remove('active');
          menuBtn.innerText = "Menu";
          document.body.style.overflow = '';
      }
  });

  // Sticky Header & FAB
  const headerWrapper = document.getElementById('header-wrapper');
  const fabUp = document.getElementById('fab-up');
  window.addEventListener('scroll', () => {
      if (window.scrollY > 20) {
          headerWrapper.classList.add('scrolled');
      } else {
          headerWrapper.classList.remove('scrolled');
      }
      if (window.scrollY > 400) {
          fabUp.classList.add('visible');
      } else {
          fabUp.classList.remove('visible');
      }
  });
  fabUp.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>
</body>
</html>
